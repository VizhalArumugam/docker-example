name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1. Get code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # 4. Run basic test
    - name: Run app test
      run: |
        python -m py_compile app.py

    # 5. Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t flask-app .

    # 6. Run Docker Container
    - name: Run Docker Container
      run: |
        docker run -d -p 5000:5000 --name flask-app-ci flask-app
        docker ps -a

    # 7. Test API Endpoint
    - name: Test API
      run: |
        set -euxo pipefail
        for i in {1..30}; do
          if curl -fsS http://localhost:5000/ > /dev/null; then
            echo "App is up"
            exit 0
          fi
          sleep 1
        done

        echo "App did not become ready. Container logs:"
        docker logs flask-app-ci || true
        echo "Container status:"
        docker ps -a || true
        exit 1